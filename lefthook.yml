pre-commit:
  parallel: true
  commands:
    format:
      glob: '*.{ts,js,cjs,mjs,json}'
      run: npx prettier --check {staged_files}
    lint:
      glob: '*.ts'
      run: npx eslint {staged_files}

pre-push:
  parallel: false
  commands:
    typecheck:
      run: npm run typecheck
    test:
      run: npm test
    dist:
      run: npm run test:dist

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}
